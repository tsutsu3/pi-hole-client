targets:
  $default:
    sources:
      exclude:
        # Exclude the OpenAPI-generated path dependency from the build graph.
        # This prevents build_runner from scanning these files and deleting
        # their pre-generated .g.dart files with --delete-conflicting-outputs.
        - lib/data/services/api/generated/**
    builders:
      freezed:
        generate_for:
          include:
            - lib/domain/**/*.dart
            - lib/data/**/*.dart
          exclude:
            - lib/data/services/api/generated/**
      json_serializable:
        generate_for:
          include:
            - lib/domain/**/*.dart
            - lib/data/**/*.dart
          exclude:
            - lib/data/services/api/generated/**
      mockito|mockBuilder:
        generate_for:
          exclude:
            # mocks.dart generates mocks for pihole_v6_api types whose .g.dart
            # part files are excluded from the build graph above. Excluding this
            # file prevents build_runner from deleting mocks.mocks.dart and then
            # failing to regenerate it due to unresolvable assets.
            - test/data/services/api/wrappers/mocks.dart
